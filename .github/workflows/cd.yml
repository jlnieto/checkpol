name: CD

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_name: ${{ steps.meta.outputs.image_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: meta
        run: |
          short_sha="${GITHUB_SHA::7}"
          echo "image_tag=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image_name=ghcr.io/jlnieto/checkpol" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -euo pipefail

            cd /opt/checkpol

            NEW_IMAGE="${{ needs.build-and-push.outputs.image_name }}:${{ needs.build-and-push.outputs.image_tag }}"
            export APP_IMAGE="${NEW_IMAGE}"

            sed -i "s|^APP_IMAGE=.*$|APP_IMAGE=${NEW_IMAGE}|" .env.prod

            docker compose --env-file .env.prod -f docker-compose.prod.yml pull app
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d

            ok=0
            for i in {1..24}; do
              if curl -fsS https://checkpol.com/bookings >/dev/null; then
                ok=1
                break
              fi
              sleep 5
            done

            if [ "${ok}" -ne 1 ]; then
              docker compose --env-file .env.prod -f docker-compose.prod.yml logs -n 200 --no-color app || true
              exit 1
            fi

            docker image prune -f
