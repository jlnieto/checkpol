services:
  postgres:
    image: postgres:16
    container_name: checkpol-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - checkpol-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkpol-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      CHECKPOL_SES_WS_URL: ${CHECKPOL_SES_WS_URL:-}
      CHECKPOL_SES_WS_APPLICATION_NAME: ${CHECKPOL_SES_WS_APPLICATION_NAME:-checkpol}
      CHECKPOL_SES_WS_TRUSTSTORE_PATH: ${CHECKPOL_SES_WS_TRUSTSTORE_PATH:-}
      CHECKPOL_SES_WS_TRUSTSTORE_PASSWORD: ${CHECKPOL_SES_WS_TRUSTSTORE_PASSWORD:-}
      CHECKPOL_SES_WS_TRUSTSTORE_TYPE: ${CHECKPOL_SES_WS_TRUSTSTORE_TYPE:-PKCS12}
      CHECKPOL_BILLING_STRIPE_SECRET_KEY: ${CHECKPOL_BILLING_STRIPE_SECRET_KEY:-}
      CHECKPOL_BILLING_STRIPE_PUBLISHABLE_KEY: ${CHECKPOL_BILLING_STRIPE_PUBLISHABLE_KEY:-}
      CHECKPOL_BILLING_STRIPE_WEBHOOK_SECRET: ${CHECKPOL_BILLING_STRIPE_WEBHOOK_SECRET:-}
      CHECKPOL_BILLING_STRIPE_PRICE_CHECKPOL_ESENCIAL: ${CHECKPOL_BILLING_STRIPE_PRICE_CHECKPOL_ESENCIAL:-}
      CHECKPOL_BILLING_STRIPE_CUSTOMER_PORTAL_CONFIGURATION_ID: ${CHECKPOL_BILLING_STRIPE_CUSTOMER_PORTAL_CONFIGURATION_ID:-}
      CHECKPOL_PUBLIC_BASE_URL: ${CHECKPOL_PUBLIC_BASE_URL:-http://localhost:${APP_PORT}}
      CHECKPOL_BILLING_SIGNUP_EXPIRATION_MINUTES: ${CHECKPOL_BILLING_SIGNUP_EXPIRATION_MINUTES:-60}
      CHECKPOL_BILLING_GRACE_PERIOD_DAYS: ${CHECKPOL_BILLING_GRACE_PERIOD_DAYS:-7}
    ports:
      - "127.0.0.1:${APP_PORT}:8080"
    volumes:
      - ${CHECKPOL_SES_WS_TRUSTSTORE_HOST_DIR:-./ops/docker/empty-ssl}:/run/checkpol/ssl:ro
    restart: unless-stopped

volumes:
  checkpol-postgres-data:
