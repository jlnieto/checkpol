<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nueva estancia | Checkpol</title>
    <link rel="stylesheet" th:href="@{/app.css}">
    <script th:src="@{/wizard-form.js}" defer></script>
</head>
<body class="bg-radial-[at_0%_0%] from-primary/12 via-background-light to-slate-50 text-slate-900 antialiased">
<main class="owner-shell-narrow">
    <section class="owner-page">
        <header class="owner-header">
            <a class="public-back-link" th:href="@{/bookings}">
                <span aria-hidden="true">←</span>
                <span>Volver</span>
            </a>
            <div class="space-y-2">
                <h1 class="owner-title" th:text="${formTitle}">Nueva estancia</h1>
                <p class="owner-copy" th:if="${#lists.isEmpty(accommodations)}">
                    Antes de crear una estancia necesitas guardar al menos una vivienda.
                </p>
            </div>
        </header>

        <section class="owner-form-shell" th:if="${#lists.isEmpty(accommodations)}">
            <h2 class="text-2xl font-extrabold tracking-tight text-slate-900">No hay viviendas creadas todavía</h2>
            <p class="mt-2 owner-copy">Primero necesitas guardar una vivienda para poder asociarle una estancia.</p>
            <div class="mt-4 owner-actions">
                <a class="owner-button-primary" th:href="@{/accommodations/new}">Crear primera vivienda</a>
            </div>
        </section>

        <section class="owner-form-shell" th:unless="${#lists.isEmpty(accommodations)}">
            <form th:action="${formAction}" th:object="${bookingForm}" method="post" class="space-y-5" data-wizard-form data-booking-form novalidate data-wizard-root>
                <div class="owner-error-box error-box" th:if="${#fields.hasGlobalErrors()}">
                    <p th:each="error : ${#fields.globalErrors()}" th:text="${error}"></p>
                </div>

                <section class="space-y-5">
                    <div class="border-b border-slate-200/80 pb-4">
                        <p class="owner-kicker">
                            <span data-step-progress>Paso 1 de 2</span>
                        </p>
                    </div>

                    <section class="space-y-5 pt-1" data-step-panel data-step-title="Datos básicos"
                             data-step-help="Vivienda, referencia y personas.">
                        <div class="owner-error-box error-box" data-panel-errors hidden></div>

                        <label class="owner-label">
                            <span>Vivienda</span>
                            <select class="owner-select" th:field="*{accommodationId}">
                                <option value="">Selecciona una vivienda</option>
                                <option th:each="accommodation : ${accommodations}" th:value="${accommodation.id}" th:text="${accommodation.name}"></option>
                            </select>
                            <small class="owner-error error" data-client-error-for="accommodationId"></small>
                            <small class="owner-error error" data-server-error th:if="${#fields.hasErrors('accommodationId')}" th:errors="*{accommodationId}"></small>
                        </label>

                        <label class="owner-label">
                            <span>Referencia Airbnb</span>
                            <input class="owner-input" th:field="*{referenceCode}" type="text" autocomplete="off" placeholder="HMYECBTMZM">
                            <small class="owner-error error" data-client-error-for="referenceCode"></small>
                            <small class="owner-error error" data-server-error th:if="${#fields.hasErrors('referenceCode')}" th:errors="*{referenceCode}"></small>
                        </label>

                        <label class="owner-label">
                            <span>Número de personas</span>
                            <input class="owner-input" th:field="*{personCount}" type="number" min="1" max="20" inputmode="numeric" placeholder="2">
                            <small class="owner-error error" data-client-error-for="personCount"></small>
                            <small class="owner-error error" data-server-error th:if="${#fields.hasErrors('personCount')}" th:errors="*{personCount}"></small>
                        </label>

                        <div class="owner-form-actions">
                            <button class="owner-button-primary btn" type="button" data-step-next>Seguir</button>
                        </div>
                    </section>

                    <section class="space-y-5" data-step-panel hidden
                             data-step-title="Fechas"
                             data-step-help="Reserva, entrada y salida.">
                        <div class="owner-error-box error-box" data-panel-errors hidden></div>

                        <div class="grid gap-4 md:grid-cols-2">
                            <label class="owner-label">
                                <span>Fecha de reserva</span>
                                <input class="owner-input" th:field="*{contractDate}" type="date" autocomplete="off">
                                <small class="owner-error error" data-client-error-for="contractDate"></small>
                                <small class="owner-error error" data-server-error th:if="${#fields.hasErrors('contractDate')}" th:errors="*{contractDate}"></small>
                            </label>

                            <label class="owner-label">
                                <span>Entrada</span>
                                <input class="owner-input" th:field="*{checkInDate}" type="date" autocomplete="off">
                                <small class="owner-error error" data-client-error-for="checkInDate"></small>
                                <small class="owner-error error" data-server-error th:if="${#fields.hasErrors('checkInDate')}" th:errors="*{checkInDate}"></small>
                            </label>

                            <label class="owner-label md:col-span-2">
                                <span>Salida</span>
                                <input class="owner-input" th:field="*{checkOutDate}" type="date" autocomplete="off">
                                <small class="owner-error error" data-client-error-for="checkOutDate"></small>
                                <small class="owner-error error" data-server-error th:if="${#fields.hasErrors('checkOutDate')}" th:errors="*{checkOutDate}"></small>
                            </label>
                        </div>

                        <div class="owner-form-actions">
                            <button type="button" class="owner-button-secondary button-ghost" data-step-prev>Paso anterior</button>
                            <button class="owner-button-primary btn" type="submit" th:text="${submitLabel}">Guardar estancia</button>
                        </div>
                    </section>
                </section>
            </form>
        </section>
    </section>
</main>
</body>
</html>
