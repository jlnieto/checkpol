<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Completar datos de huesped | Checkpol</title>
    <link rel="stylesheet" th:href="@{/app.css}">
    <script th:src="@{/wizard-form.js}" defer></script>
</head>
<body class="bg-radial-[at_0%_0%] from-primary/12 via-background-light to-slate-50 text-slate-900 antialiased">
<main class="public-shell public-shell-xl">
    <header class="mb-5 space-y-3 md:mb-6">
        <a class="public-back-link"
           th:href="@{|/guest-access/${access.booking.selfServiceToken}|}">
            <span aria-hidden="true">←</span>
            <span>Volver al resumen</span>
        </a>

        <div class="space-y-1">
            <h1 class="max-w-[16ch] text-2xl font-semibold tracking-tight text-slate-900 sm:text-3xl"
                th:text="${guestWizardTitle}">Datos del huesped 1</h1>
        </div>
    </header>

    <div class="mb-4 public-error-box shadow-sm" th:if="${flashMessage}" th:text="${flashMessage}"></div>

    <section class="grid gap-5 lg:grid-cols-[minmax(0,1.25fr)_minmax(300px,0.75fr)]" data-wizard-root>
        <form th:action="${publicEditGuestId != null} ? @{|/guest-access/${access.booking.selfServiceToken}/guests/${publicEditGuestId}|} : @{|/guest-access/${access.booking.selfServiceToken}/guests|}"
              th:object="${guestForm}"
              method="post"
              class="space-y-4"
              data-wizard-form
              data-guest-form
              novalidate
              th:attr="data-check-in-date=${#temporals.format(access.booking.checkInDate, 'yyyy-MM-dd')},data-initial-step=${initialStep}">
            <input th:if="${param.slot != null}" type="hidden" name="slot" th:value="${param.slot}">
            <input th:if="${param.extra != null}" type="hidden" name="extra" th:value="${param.extra}">

            <div class="public-error-box" th:if="${#fields.hasGlobalErrors()}">
                <p th:each="error : ${#fields.globalErrors()}" th:text="${error}"></p>
            </div>

            <section class="public-panel overflow-hidden p-5 sm:p-6">
                <div class="flex flex-col gap-4 border-b border-slate-200/80 pb-5">
                    <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                        <div class="space-y-1">
                            <p class="text-xs font-semibold tracking-[0.12em] text-slate-500">
                                <span class="uppercase" data-step-progress>Paso 1 de 4</span>
                                <span aria-hidden="true" class="mx-1">·</span>
                                <span class="tracking-normal" data-current-step-title>Datos personales</span>
                            </p>
                            <p class="text-sm leading-6 text-slate-500" data-current-step-help></p>
                        </div>
                    </div>

                    <div class="h-2 overflow-hidden rounded-full bg-primary/10" aria-hidden="true">
                        <span class="block h-full w-1/4 rounded-full bg-linear-to-r from-primary to-sky-400 transition-[width] duration-200"
                              data-step-progress-bar></span>
                    </div>
                </div>

                <div class="pt-5 sm:pt-6">
                    <section class="space-y-5" data-step-panel
                             data-step-title="Datos personales"
                             data-step-count="Paso 1 de 4"
                             data-step-help=""
                             data-step-note="Escribe el nombre igual que en el documento.">
                        <div class="public-error-box" data-panel-errors hidden></div>

                        <div class="grid gap-4 md:grid-cols-2">
                            <label class="public-label">
                                <span>Nombre</span>
                                <input class="public-input" th:field="*{firstName}" type="text" autocomplete="given-name"
                                       placeholder="Nombre como en el documento" data-auto-capitalize data-next-field="lastName1">
                                <small class="public-error error" data-client-error-for="firstName"></small>
                                <small class="public-error error" data-server-error th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></small>
                            </label>
                            <label class="public-label">
                                <span>Primer apellido</span>
                                <input class="public-input" th:field="*{lastName1}" type="text" autocomplete="family-name"
                                       placeholder="Primer apellido" data-auto-capitalize data-next-field="lastName2">
                                <small class="public-error error" data-client-error-for="lastName1"></small>
                                <small class="public-error error" data-server-error th:if="${#fields.hasErrors('lastName1')}" th:errors="*{lastName1}"></small>
                            </label>
                        </div>

                        <label class="public-label">
                            <span>Segundo apellido</span>
                            <input class="public-input" th:field="*{lastName2}" type="text" autocomplete="additional-name"
                                   placeholder="Segundo apellido" data-auto-capitalize data-next-field="birthDate">
                            <small class="public-error error" data-client-error-for="lastName2"></small>
                            <small class="public-error error" data-server-error th:if="${#fields.hasErrors('lastName2')}" th:errors="*{lastName2}"></small>
                        </label>

                        <div class="grid gap-4 md:grid-cols-2">
                            <label class="public-label">
                                <span>Fecha de nacimiento</span>
                                <input class="public-input" th:field="*{birthDate}" type="date" autocomplete="bday" data-birth-date-field data-next-field="nationalityDisplay">
                                <small class="public-error error" data-client-error-for="birthDate"></small>
                                <small class="public-error error" data-server-error th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"></small>
                            </label>
                            <label class="public-label">
                                <span>Nacionalidad</span>
                                <input type="hidden" th:field="*{nationality}">
                                <input class="public-input" type="text" list="nationality-options-public" data-country-display="nationality"
                                       name="nationalityDisplay" placeholder="Espana (ESP)" autocomplete="country-name">
                                <datalist id="nationality-options-public">
                                    <option th:each="country : ${countries}" th:value="${country.label + ' (' + country.code + ')'}"></option>
                                </datalist>
                                <small class="public-error error" data-client-error-for="nationality"></small>
                                <small class="public-error error" data-server-error th:if="${#fields.hasErrors('nationality')}" th:errors="*{nationality}"></small>
                            </label>
                        </div>

                        <div class="flex justify-end">
                            <button type="button" class="public-button-primary min-w-40" data-step-next>Continuar</button>
                        </div>
                    </section>

                    <section class="space-y-5" data-step-panel hidden
                             data-step-title="Documento"
                             data-step-count="Paso 2 de 4"
                             data-step-help=""
                             data-step-note="Escribe el numero sin espacios ni guiones.">
                        <div class="public-error-box" data-panel-errors hidden></div>

                        <div class="grid gap-4 md:grid-cols-2">
                            <label class="public-label">
                                <span>Tipo de documento</span>
                                <select class="public-select" th:field="*{documentType}">
                                    <option value="">Selecciona...</option>
                                    <option th:each="documentType : ${documentTypes}" th:value="${documentType}" th:text="${documentType.label}"></option>
                                </select>
                                <small class="public-error error" data-client-error-for="documentType"></small>
                            </label>
                            <label class="public-label">
                                <span>Numero de documento</span>
                                <input class="public-input" th:field="*{documentNumber}" type="text" autocomplete="off"
                                       placeholder="12345678Z" data-document-number-field data-next-field="documentSupport">
                                <small class="public-hint field-hint" data-document-number-hint>Sin espacios ni guiones</small>
                                <small class="public-error error" data-client-error-for="documentNumber"></small>
                                <small class="public-error error" data-server-error th:if="${#fields.hasErrors('documentNumber')}" th:errors="*{documentNumber}"></small>
                            </label>
                        </div>

                        <div class="grid gap-4 md:grid-cols-2">
                            <label class="public-label" data-document-support-group hidden>
                                <span>Soporte del documento</span>
                                <input class="public-input" th:field="*{documentSupport}" type="text" autocomplete="off" data-document-support-field>
                                <small class="public-hint field-hint" data-document-support-help>Numero del documento</small>
                                <small class="public-error error" data-client-error-for="documentSupport"></small>
                                <small class="public-error error" data-server-error th:if="${#fields.hasErrors('documentSupport')}" th:errors="*{documentSupport}"></small>
                            </label>
                            <label class="public-label">
                                <span>Sexo</span>
                                <select class="public-select" th:field="*{sex}">
                                    <option value="">Selecciona...</option>
                                    <option th:each="sex : ${sexes}" th:value="${sex}" th:text="${sex.label}"></option>
                                </select>
                                <small class="public-error error" data-client-error-for="sex"></small>
                                <small class="public-error error" data-server-error th:if="${#fields.hasErrors('sex')}" th:errors="*{sex}"></small>
                            </label>
                        </div>

                        <label class="public-label" data-relationship-field hidden>
                            <span>Parentesco con la persona adulta que hace la reserva</span>
                            <select class="public-select" th:field="*{relationship}">
                                <option value="">Selecciona...</option>
                                <option th:each="relationship : ${relationships}" th:value="${relationship}" th:text="${relationship.label}"></option>
                            </select>
                            <small class="public-hint">Solo se pide si la persona sera menor de edad el dia de entrada.</small>
                            <small class="public-error error" data-client-error-for="relationship"></small>
                            <small class="public-error error" data-server-error th:if="${#fields.hasErrors('relationship')}" th:errors="*{relationship}"></small>
                        </label>

                        <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-between">
                            <button type="button" class="public-button-secondary" data-step-prev>Volver</button>
                            <button type="button" class="public-button-primary min-w-40" data-step-next>Continuar</button>
                        </div>
                    </section>

                    <section class="space-y-5" data-step-panel hidden
                             data-step-title="Direccion habitual"
                             data-step-count="Paso 3 de 4"
                             data-step-help=""
                             data-step-note="Si no ves tu direccion, creala y volveras a este punto.">
                        <div class="public-error-box" data-panel-errors hidden></div>

                        <div class="space-y-4" data-address-choice-shell>
                            <div class="grid gap-3">
                                <label class="public-choice-card address-choice-card"
                                       data-address-choice-card
                                       th:each="address : ${addresses}">
                                    <input class="address-choice-input sr-only" th:field="*{addressId}" type="radio" th:value="${address.id}">
                                    <span class="flex items-start justify-between gap-3">
                                        <span class="min-w-0">
                                            <span class="block text-base font-semibold text-slate-900" th:text="${address.displayLine1}">Calle Mayor 1</span>
                                            <span class="mt-1 block text-sm leading-6 text-slate-500" th:text="${address.displayLine2}">28001 · Madrid · ESP</span>
                                        </span>
                                        <span class="public-pill-muted address-choice-tag">Usar esta direccion</span>
                                    </span>
                                </label>

                                <button type="submit"
                                        class="public-choice-card public-choice-card-link address-choice-card address-choice-card-secondary address-choice-card-link"
                                        data-address-choice-card
                                        th:formaction="${saveAddressDraftAction}"
                                        formmethod="post"
                                        data-skip-panel-validation>
                                    <span>
                                        <span class="block text-base font-semibold text-slate-900">Introducir nueva direccion</span>
                                        <span class="mt-1 block text-sm leading-6 text-slate-500">Se guardará y volverás al flujo del huésped.</span>
                                    </span>
                                    <span class="public-pill-primary address-choice-tag">Crear</span>
                                </button>
                            </div>

                            <small class="public-error error" data-client-error-for="addressId"></small>
                            <small class="public-error error" data-server-error th:if="${#fields.hasErrors('addressId')}" th:errors="*{addressId}"></small>
                        </div>

                        <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-between">
                            <button type="button" class="public-button-secondary" data-step-prev>Volver</button>
                            <button type="button" class="public-button-primary min-w-40" data-step-next>Continuar</button>
                        </div>
                    </section>

                    <section class="space-y-5" data-step-panel hidden
                             data-step-title="Contacto"
                             data-step-count="Paso 4 de 4"
                             data-step-help=""
                             data-step-note="Basta con un telefono o un correo validos.">
                        <div class="public-error-box" data-panel-errors hidden></div>

                        <div class="grid gap-4 md:grid-cols-2">
                            <label class="public-label">
                                <span>Telefono</span>
                                <input class="public-input" th:field="*{phone}" type="tel" autocomplete="tel" inputmode="tel" placeholder="+34 600 123 123" data-phone-primary>
                                <small class="public-error error" data-client-error-for="phone"></small>
                                <small class="public-error error" data-server-error th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></small>
                            </label>
                            <label class="public-label">
                                <span>Otro telefono</span>
                                <input class="public-input" th:field="*{phone2}" type="tel" autocomplete="tel-national" inputmode="tel" placeholder="+34 600 123 123">
                                <small class="public-error error" data-client-error-for="phone2"></small>
                                <small class="public-error error" data-server-error th:if="${#fields.hasErrors('phone2')}" th:errors="*{phone2}"></small>
                            </label>
                        </div>

                        <label class="public-label">
                            <span>Correo</span>
                            <input class="public-input" th:field="*{email}" type="email" placeholder="nombre@correo.com">
                            <small class="public-error error" data-client-error-for="email"></small>
                            <small class="public-error error" data-server-error th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                        </label>

                        <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-between">
                            <button type="button" class="public-button-secondary" data-step-prev>Volver</button>
                            <button type="submit" class="public-button-primary min-w-48">Guardar y finalizar</button>
                        </div>
                    </section>
                </div>
            </section>
        </form>

        <aside class="space-y-4 lg:sticky lg:top-6 lg:self-start">
            <div class="public-panel-gradient p-5" data-step-note-shell hidden>
                <p class="text-xs font-semibold uppercase tracking-[0.16em] text-slate-500">Recuerda</p>
                <p class="mt-4 text-sm leading-6 text-slate-600" data-step-note-text></p>
            </div>
        </aside>
    </section>
</main>
</body>
</html>
