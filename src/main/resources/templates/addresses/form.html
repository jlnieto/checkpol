<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nueva dirección | Checkpol</title>
    <link rel="stylesheet" th:href="@{/app.css}">
    <script th:src="@{/address-form.js}" defer></script>
</head>
<body class="bg-radial-[at_0%_0%] from-primary/12 via-background-light to-slate-50 text-slate-900 antialiased">
<main class="owner-shell-narrow">
    <section class="owner-page">
        <header class="owner-header">
            <a class="public-back-link" th:href="${backUrl}">
                <span aria-hidden="true">←</span>
                <span>Volver</span>
            </a>

            <div class="space-y-2">
                <p class="owner-kicker">Direcciones</p>
                <h1 class="owner-title" th:text="${pageTitle}">Nueva dirección</h1>
                <p class="owner-copy" th:text="${details.booking.accommodation.name + ' · ' + details.booking.referenceCode}">Casita · ABC123</p>
            </div>
        </header>

        <section class="owner-form-shell">
            <form th:action="${formAction}" th:object="${addressForm}" method="post" class="space-y-5" data-address-form>
                <input th:if="${guestId != null}" type="hidden" name="guestId" th:value="${guestId}">
                <input th:field="*{municipalityCode}" type="hidden" data-municipality-code-field>
                <input th:field="*{municipalityName}" type="hidden" data-municipality-name-field>

                <div class="owner-error-box error-box" th:if="${#fields.hasGlobalErrors()}">
                    <p th:each="error : ${#fields.globalErrors()}" th:text="${error}"></p>
                </div>

                <label class="owner-label">
                    <span>Dirección</span>
                    <input class="owner-input" th:field="*{addressLine}" type="text" autocomplete="street-address" placeholder="Calle, número y piso">
                    <small class="owner-error error" data-server-error th:if="${#fields.hasErrors('addressLine')}" th:errors="*{addressLine}"></small>
                </label>

                <label class="owner-label">
                    <span>Complemento</span>
                    <input class="owner-input" th:field="*{addressComplement}" type="text" autocomplete="address-line2" placeholder="Piso, puerta, escalera...">
                    <small class="owner-error error" data-server-error th:if="${#fields.hasErrors('addressComplement')}" th:errors="*{addressComplement}"></small>
                </label>

                <label class="owner-label">
                    <span>País</span>
                    <select class="owner-select" th:field="*{country}" data-country-field>
                        <option value="">Selecciona...</option>
                        <option th:each="country : ${countries}" th:value="${country.code}" th:text="${country.label + ' (' + country.code + ')'}"></option>
                    </select>
                    <small class="owner-error error" data-server-error th:if="${#fields.hasErrors('country')}" th:errors="*{country}"></small>
                </label>

                <label class="owner-label">
                    <span>Código postal</span>
                    <input class="owner-input" th:field="*{postalCode}" type="text" inputmode="numeric" autocomplete="postal-code" placeholder="28001" data-postal-code-field>
                    <small class="public-hint field-hint">En España, este código postal carga el municipio oficial.</small>
                    <small class="owner-error error" data-server-error th:if="${#fields.hasErrors('postalCode')}" th:errors="*{postalCode}"></small>
                </label>

                <label class="owner-label owner-label-followup" data-spanish-municipality-shell hidden>
                    <span>Municipio oficial</span>
                    <select class="owner-select" data-spanish-municipality-select>
                        <option value="">Municipio</option>
                    </select>
                    <small class="public-hint field-hint" data-spanish-municipality-hint hidden aria-live="polite"></small>
                </label>

                <label class="owner-label" data-municipality-text-shell>
                    <span>Ciudad o municipio</span>
                    <input class="owner-input" th:value="*{municipalityName}" type="text" autocomplete="address-level2" placeholder="Madrid" data-municipality-manual-input>
                    <small class="owner-error error" data-server-error th:if="${#fields.hasErrors('municipalityName')}" th:errors="*{municipalityName}"></small>
                </label>

                <div class="owner-form-actions">
                    <a class="owner-button-secondary" th:href="${backUrl}">Cancelar</a>
                    <button class="owner-button-primary" type="submit">Guardar dirección</button>
                </div>
            </form>
        </section>
    </section>
</main>
</body>
</html>
