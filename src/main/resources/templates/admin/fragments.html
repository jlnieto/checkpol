<th:block xmlns:th="http://www.thymeleaf.org">
<header th:fragment="topbar(searchPlaceholder)" class="mono-topbar">
    <div class="mono-topbar-left">
        <button class="mono-topbar-button" type="button" aria-label="Navegación">
            <svg class="mono-topbar-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M3 5h14v2H3V5Zm0 4h14v2H3V9Zm0 4h14v2H3v-2Z"/>
            </svg>
        </button>
        <label class="mono-search">
            <svg class="mono-search-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M8.5 3a5.5 5.5 0 1 1 0 11 5.5 5.5 0 0 1 0-11Zm0 1.5a4 4 0 1 0 2.6 7l3.2 3.2 1.1-1.1-3.2-3.2A4 4 0 0 0 8.5 4.5Z"/>
            </svg>
            <input class="mono-search-input" type="text" th:placeholder="${searchPlaceholder}" readonly>
        </label>
    </div>
    <div class="mono-topbar-right">
        <span class="mono-topbar-meta">Catálogo:
            <strong th:text="${dashboard.currentSourceVersion != null ? dashboard.currentSourceVersion : 'SIN_VERSIÓN'}">SIN_VERSIÓN</strong>
        </span>
        <span class="mono-topbar-divider"></span>
        <span class="mono-topbar-user">Admin Central</span>
        <div class="mono-topbar-avatar">A</div>
    </div>
</header>

<aside th:fragment="sidebar(activeSection)" class="mono-sidebar">
    <div class="mono-brand">
        <h1 class="mono-brand-title">CHECKPOL</h1>
        <p class="mono-brand-copy">Classic Admin</p>
    </div>

    <nav class="mono-nav">
        <a class="mono-nav-link"
           th:classappend="${activeSection == 'overview' ? ' mono-nav-link-active' : ''}"
           th:href="@{/admin}">
            <svg class="mono-nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M3 3h6v6H3V3Zm8 0h6v4h-6V3ZM3 11h6v6H3v-6Zm8-2h6v8h-6V9Z"/>
            </svg>
            <span class="mono-nav-text">Dashboard</span>
        </a>
        <a class="mono-nav-link"
           th:classappend="${activeSection == 'users' ? ' mono-nav-link-active' : ''}"
           th:href="@{/admin/users}">
            <svg class="mono-nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M10 10a3.5 3.5 0 1 0-3.5-3.5A3.5 3.5 0 0 0 10 10Zm-5.5 6a5.5 5.5 0 0 1 11 0H4.5Z"/>
            </svg>
            <span class="mono-nav-text">Usuarios</span>
        </a>
        <a class="mono-nav-link"
           th:classappend="${activeSection == 'ses' ? ' mono-nav-link-active' : ''}"
           th:href="@{/admin/ses}">
            <svg class="mono-nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M4 4h12v3H4V4Zm0 4.5h12V16H4V8.5Zm2 2V14h3v-3.5H6Zm5 0V14h3v-3.5h-3Z"/>
            </svg>
            <span class="mono-nav-text">SES</span>
        </a>
        <a class="mono-nav-link"
           th:classappend="${activeSection == 'incidents' ? ' mono-nav-link-active' : ''}"
           th:href="@{/admin/incidents}">
            <svg class="mono-nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M10 2 2.8 16h14.4L10 2Zm0 4.2 4.4 8.3H5.6L10 6.2Zm-.8 2.8h1.6v3.3H9.2V9Zm0 4.2h1.6v1.5H9.2v-1.5Z"/>
            </svg>
            <span class="mono-nav-text">Incidencias</span>
        </a>
        <a class="mono-nav-link"
           th:classappend="${activeSection == 'catalog' ? ' mono-nav-link-active' : ''}"
           th:href="@{/admin/municipalities}">
            <svg class="mono-nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M4 3h9l3 3v11H4V3Zm2 2v10h8V7.2L12.8 5H6Zm1.5 3h5v1.5h-5V8Zm0 3h5v1.5h-5V11Z"/>
            </svg>
            <span class="mono-nav-text">Catálogo oficial</span>
        </a>
        <a class="mono-nav-link"
           th:classappend="${activeSection == 'verifications' ? ' mono-nav-link-active' : ''}"
           th:href="@{/admin/verifications}">
            <svg class="mono-nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M10 2 3 5v4c0 4.4 2.9 6.8 7 9 4.1-2.2 7-4.6 7-9V5l-7-3Zm0 2.2 5 2.1v2.7c0 3.1-1.9 4.9-5 6.7-3.1-1.8-5-3.6-5-6.7V6.3l5-2.1Z"/>
            </svg>
            <span class="mono-nav-text">Verificaciones</span>
        </a>
        <a class="mono-nav-link"
           th:classappend="${activeSection == 'imports' ? ' mono-nav-link-active' : ''}"
           th:href="@{/admin/imports}">
            <svg class="mono-nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M4 4h12v3H4V4Zm0 4.5h12V16H4V8.5Zm2 2V14h3v-3.5H6Zm5 0V14h3v-3.5h-3Z"/>
            </svg>
            <span class="mono-nav-text">Importaciones</span>
        </a>
        <a class="mono-nav-link"
           th:classappend="${activeSection == 'activity' ? ' mono-nav-link-active' : ''}"
           th:href="@{/admin/activity}">
            <svg class="mono-nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M10 3.5A6.5 6.5 0 1 0 16.5 10H15a5 5 0 1 1-5-5V3.5Zm.75 2h-1.5V10l3.5 2.1.75-1.23-2.75-1.65V5.5Z"/>
            </svg>
            <span class="mono-nav-text">Actividad reciente</span>
        </a>
    </nav>

    <div class="mono-sidebar-footer">
        <a class="mono-footer-link"
           th:classappend="${activeSection == 'settings' ? ' mono-footer-link-active' : ''}"
           th:href="@{/admin/settings}">
            <svg class="mono-nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M8.9 2h2.2l.4 1.9a6.5 6.5 0 0 1 1.7.7l1.6-1.1 1.6 1.6-1.1 1.6c.3.5.5 1.1.7 1.7L18 8.9v2.2l-1.9.4a6.5 6.5 0 0 1-.7 1.7l1.1 1.6-1.6 1.6-1.6-1.1a6.5 6.5 0 0 1-1.7.7L11.1 18H8.9l-.4-1.9a6.5 6.5 0 0 1-1.7-.7l-1.6 1.1-1.6-1.6 1.1-1.6a6.5 6.5 0 0 1-.7-1.7L2 11.1V8.9l1.9-.4c.1-.6.4-1.2.7-1.7L3.5 5.2l1.6-1.6 1.6 1.1c.5-.3 1.1-.5 1.7-.7L8.9 2Zm1.1 5A3 3 0 1 0 13 10a3 3 0 0 0-3-3Z"/>
            </svg>
            <span>Settings</span>
        </a>
        <form class="mono-footer-form" th:action="@{/logout}" method="post">
            <button class="mono-footer-link mono-footer-button" type="submit">
                <svg class="mono-nav-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <path d="M11 3h6v14h-6v-2h4V5h-4V3ZM9 6l1.4 1.4-1.6 1.6H2v2h6.8l1.6 1.6L9 14l-4-4 4-4Z"/>
                </svg>
                <span>Logout</span>
            </button>
        </form>
    </div>
</aside>
</th:block>
