<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cambiar contraseña | Checkpol</title>
    <link rel="stylesheet" th:href="@{/app.css}">
</head>
<body class="mono-body antialiased">
<main class="mono-app">
    <aside class="mono-sidebar-shell" th:replace="~{admin/fragments :: sidebar('users')}"></aside>

    <section class="mono-content">
        <header th:replace="~{admin/fragments :: topbar('Cambio de contraseña')}"></header>

        <div class="mono-page">
            <div class="mono-page-head">
                <h1 class="mono-page-title">Cambiar contraseña</h1>
                <nav class="mono-breadcrumb">
                    <span>Admin</span>
                    <span>/</span>
                    <span>Usuarios</span>
                    <span>/</span>
                    <span class="mono-breadcrumb-active" th:text="${editedUser.displayName}">Usuario</span>
                </nav>
            </div>

            <section class="mono-layout">
                <div class="mono-main">
                    <section class="mono-form-panel">
                        <div class="mono-panel-strip">
                            <h2 class="mono-panel-title">Nueva contraseña</h2>
                        </div>
                        <div class="mono-panel-body">
                            <form th:action="@{${passwordAction}}" th:object="${adminPasswordForm}" method="post" class="mono-form-grid" novalidate>
                                <div class="mono-alert-error md:col-span-2" th:if="${#fields.hasGlobalErrors()}">
                                    <p th:each="error : ${#fields.globalErrors()}" th:text="${error}">Error</p>
                                </div>

                                <div class="mono-field md:col-span-2">
                                    <span class="mono-field-label">Usuario afectado</span>
                                    <p class="mono-table-strong" th:text="${editedUser.displayName}">Administrador</p>
                                    <p class="mono-table-meta" th:text="${editedUser.username}">admin</p>
                                </div>

                                <label class="mono-field md:col-span-2" th:if="${selfPasswordChange}">
                                    <span class="mono-field-label">Contraseña actual</span>
                                    <input class="mono-field-input" th:field="*{currentPassword}" type="password" autocomplete="current-password">
                                    <small class="mono-field-help">Por seguridad, al cambiar tu propia contraseña tienes que confirmar la actual.</small>
                                    <small class="mono-field-error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></small>
                                </label>

                                <label class="mono-field">
                                    <span class="mono-field-label">Nueva contraseña</span>
                                    <input class="mono-field-input" th:field="*{newPassword}" type="password" autocomplete="new-password">
                                    <small class="mono-field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></small>
                                </label>

                                <label class="mono-field">
                                    <span class="mono-field-label">Confirmar nueva contraseña</span>
                                    <input class="mono-field-input" th:field="*{confirmPassword}" type="password" autocomplete="new-password">
                                    <small class="mono-field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></small>
                                </label>

                                <div class="mono-inline-actions md:col-span-2">
                                    <a class="mono-btn-secondary" th:href="@{|/admin/users/${editedUser.id}/edit|}">Cancelar</a>
                                    <button class="mono-btn-primary" type="submit">Actualizar contraseña</button>
                                </div>
                            </form>
                        </div>
                    </section>
                </div>

                <aside class="mono-rail">
                    <section class="mono-message">
                        <p class="mono-message-label" th:text="${selfPasswordChange ? 'Cambio sensible' : 'Reset administrativo'}">Cambio sensible</p>
                        <p class="mono-message-copy"
                           th:text="${selfPasswordChange
                               ? 'Estás cambiando la contraseña de tu propia cuenta. Se pide la contraseña actual para evitar cambios accidentales.'
                               : 'Estás reseteando la contraseña de otro usuario. No necesitas conocer su contraseña anterior.'}">
                            Estás cambiando una contraseña.
                        </p>
                    </section>
                </aside>
            </section>
        </div>
    </section>
</main>
</body>
</html>
