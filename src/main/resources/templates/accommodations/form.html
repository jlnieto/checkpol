<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nueva vivienda | Checkpol</title>
    <link rel="stylesheet" th:href="@{/app.css}">
</head>
<body class="owner-body">
<main class="owner-shell-narrow">
    <div th:replace="~{fragments/owner-menu :: ownerMenu('accommodations')}"></div>

    <section class="owner-page">
        <header class="owner-header">
            <a class="public-back-link" th:href="@{/accommodations}">
                <span aria-hidden="true">←</span>
                <span>Volver</span>
            </a>

            <div class="space-y-1">
                <p class="owner-kicker">Viviendas</p>
                <h1 class="owner-title" th:text="${formTitle}">Nueva vivienda</h1>
                <p class="owner-copy">Guarda primero el nombre y el código SES.</p>
            </div>
        </header>

        <section class="mx-auto w-full max-w-2xl">
            <div class="owner-form-shell">
                <form th:action="${formAction}" th:object="${accommodationForm}" method="post" class="space-y-6" novalidate>
                    <section class="owner-form-section-highlight">
                        <div class="space-y-2">
                            <p class="owner-kicker">Obligatorio para guardar</p>
                            <h2 class="text-2xl font-extrabold tracking-tight text-slate-900">Lo mínimo para dejarla lista</h2>
                        </div>

                        <div class="space-y-5">
                            <label class="owner-label">
                                <span>Nombre de la vivienda *</span>
                                <input class="owner-input" th:field="*{name}" type="text" autocomplete="off" maxlength="120" required placeholder="Casa del Puerto">
                                <small class="public-hint">El nombre con el que la reconocerás en tus estancias.</small>
                                <small class="owner-error error" data-server-error th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
                            </label>

                            <label class="owner-label">
                                <span>Código SES del establecimiento *</span>
                                <input class="owner-input" th:field="*{sesEstablishmentCode}" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" maxlength="10" required placeholder="H123456789">
                                <small class="public-hint">El código oficial de SES para esta vivienda. Debe tener 10 caracteres.</small>
                                <small class="owner-error error" data-server-error th:if="${#fields.hasErrors('sesEstablishmentCode')}" th:errors="*{sesEstablishmentCode}"></small>
                            </label>
                        </div>
                    </section>

                    <section class="owner-form-section">
                        <div class="space-y-1">
                            <p class="owner-kicker">Opcional por ahora</p>
                            <p class="text-sm leading-6 text-slate-500">Solo si te ayuda a tener la vivienda mejor organizada.</p>
                        </div>

                        <div class="space-y-5">
                            <label class="owner-label">
                                <span>Número de registro turístico</span>
                                <input class="owner-input" th:field="*{registrationNumber}" type="text" autocomplete="off" maxlength="40" placeholder="VT-1234-A">
                                <small class="public-hint">Licencia o registro turístico.</small>
                                <small class="owner-error error" data-server-error th:if="${#fields.hasErrors('registrationNumber')}" th:errors="*{registrationNumber}"></small>
                            </label>

                            <label class="owner-label">
                                <span>Número de habitaciones</span>
                                <input class="owner-input" th:field="*{roomCount}" type="number" min="1" max="50" inputmode="numeric" placeholder="2">
                                <small class="public-hint">Dato interno opcional.</small>
                                <small class="owner-error error" data-server-error th:if="${#fields.hasErrors('roomCount')}" th:errors="*{roomCount}"></small>
                            </label>
                        </div>
                    </section>

                    <div class="owner-form-footer">
                        <p class="text-sm leading-6 text-slate-500">Después podrás registrar una estancia.</p>
                        <button class="owner-button-primary w-full justify-center" type="submit" th:text="${submitLabel}">Guardar vivienda</button>
                        <a class="owner-button-secondary w-full justify-center" th:href="@{/accommodations}">Cancelar</a>
                    </div>
                </form>
            </div>
        </section>
    </section>
</main>
<script defer th:src="@{/vendor/alpinejs.min.js}"></script>
</body>
</html>
