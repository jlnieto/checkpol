<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nueva vivienda | Checkpol</title>
    <link rel="stylesheet" th:href="@{/app.css}">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/owner.css}">
    <link rel="stylesheet" th:href="@{/css/public.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<main class="shell shell-narrow">
    <header class="page-header">
        <a class="back-link" th:href="@{/bookings}">Volver a estancias</a>
        <h1 th:text="${formTitle}">Nueva vivienda</h1>
        <p>Guarda solo los datos necesarios para empezar a trabajar.</p>
    </header>

    <section class="panel">
        <form th:action="${formAction}" th:object="${accommodationForm}" method="post" class="form-grid" novalidate>
            <label>
                <span>Nombre de la vivienda</span>
                <input th:field="*{name}" type="text" autocomplete="off">
                <small class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
            </label>

            <label>
                <span>Codigo SES del establecimiento</span>
                <input th:field="*{sesEstablishmentCode}" type="text" autocomplete="off">
                <small>Es el codigo del establecimiento que aparece en SES Hospedajes.</small>
                <small class="error" th:if="${#fields.hasErrors('sesEstablishmentCode')}" th:errors="*{sesEstablishmentCode}"></small>
            </label>

            <label>
                <span>Numero de registro turistico</span>
                <input th:field="*{registrationNumber}" type="text" autocomplete="off">
                <small>Es la licencia o registro turistico oficial de la vivienda.</small>
                <small class="error" th:if="${#fields.hasErrors('registrationNumber')}" th:errors="*{registrationNumber}"></small>
            </label>

            <label>
                <span>Numero de habitaciones</span>
                <input th:field="*{roomCount}" type="number" min="1" max="50" inputmode="numeric">
                <small>Sirve para completar mejor los datos de la vivienda.</small>
                <small class="error" th:if="${#fields.hasErrors('roomCount')}" th:errors="*{roomCount}"></small>
            </label>

            <div class="actions">
                <button class="btn" type="submit" th:text="${submitLabel}">Guardar vivienda</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
