<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="ownerMenu(activeSection)"
     x-data="{ ownerMenuOpen: false }"
     x-init="$watch('ownerMenuOpen', value => document.body.classList.toggle('overflow-hidden', value))">
    <div class="owner-menu-shell">
        <a class="owner-menu-brand" th:href="@{/bookings}">
            <span class="owner-menu-brand-mark" aria-hidden="true">C</span>
            <span class="owner-menu-brand-copy">
                <span class="owner-menu-brand-name">Checkpol</span>
                <span class="owner-menu-brand-subtitle">Área propietario</span>
            </span>
        </a>

        <nav class="owner-menu-nav" aria-label="Gestiones principales">
            <a class="owner-menu-nav-link" th:classappend="${activeSection == 'bookings'} ? ' owner-menu-nav-link-active'" th:href="@{/bookings}">Estancias</a>
            <a class="owner-menu-nav-link" th:classappend="${activeSection == 'accommodations'} ? ' owner-menu-nav-link-active'" th:href="@{/accommodations}">Viviendas</a>
            <a class="owner-menu-nav-link" th:classappend="${activeSection == 'ses'} ? ' owner-menu-nav-link-active'" th:href="@{/bookings/ses-settings}">Conexión SES</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="owner-menu-nav-link owner-menu-nav-logout">Salir</button>
            </form>
        </nav>

        <button type="button"
                class="owner-menu-button"
                @click="ownerMenuOpen = true"
                aria-label="Abrir menú">
            <span>Menú</span>
            <span aria-hidden="true">&#9776;</span>
        </button>
    </div>

    <div x-cloak
         x-show="ownerMenuOpen"
         x-transition.opacity
         class="owner-drawer-backdrop"
         @click="ownerMenuOpen = false"></div>

    <aside x-cloak
           x-show="ownerMenuOpen"
           x-transition:enter="transition ease-out duration-200"
           x-transition:enter-start="translate-x-full opacity-0"
           x-transition:enter-end="translate-x-0 opacity-100"
           x-transition:leave="transition ease-in duration-150"
           x-transition:leave-start="translate-x-0 opacity-100"
           x-transition:leave-end="translate-x-full opacity-0"
           class="owner-drawer"
           @keydown.escape.window="ownerMenuOpen = false">
        <div class="owner-drawer-header">
            <div class="space-y-1">
                <p class="owner-kicker">Checkpol</p>
                <h2 class="text-xl font-extrabold tracking-tight text-slate-900">Menú</h2>
            </div>
            <button type="button" class="owner-icon-button" @click="ownerMenuOpen = false" aria-label="Cerrar menú">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>

        <nav class="owner-drawer-nav" aria-label="Gestiones principales">
            <a class="owner-drawer-link" th:classappend="${activeSection == 'bookings'} ? ' owner-drawer-link-active'" th:href="@{/bookings}" @click="ownerMenuOpen = false">Estancias</a>
            <a class="owner-drawer-link" th:classappend="${activeSection == 'accommodations'} ? ' owner-drawer-link-active'" th:href="@{/accommodations}" @click="ownerMenuOpen = false">Viviendas</a>
            <a class="owner-drawer-link" th:classappend="${activeSection == 'ses'} ? ' owner-drawer-link-active'" th:href="@{/bookings/ses-settings}" @click="ownerMenuOpen = false">Conexión SES</a>
            <form th:action="@{/logout}" method="post" @submit="ownerMenuOpen = false">
                <button type="submit" class="owner-drawer-link w-full text-left">Cerrar sesión</button>
            </form>
        </nav>

        <div class="owner-drawer-note">
            <p class="owner-kicker">Orden recomendado</p>
            <p class="mt-1 text-sm leading-6 text-slate-600">Revisa primero lo pendiente. Después registra nuevas reservas o corrige viviendas.</p>
        </div>
    </aside>
</div>
</body>
</html>
