<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso bloqueado | Checkpol</title>
    <link rel="stylesheet" th:href="@{/app.css}">
</head>
<body class="bg-radial-[at_0%_0%] from-primary/12 via-background-light to-slate-50 text-slate-900 antialiased">
<main class="owner-shell-narrow">
    <section class="owner-page">
        <div class="inline-flex items-center rounded-full bg-amber-100 px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.16em] text-amber-700 shadow-sm">
            Acceso bloqueado
        </div>

        <section class="owner-card mt-5">
            <div class="space-y-3">
                <h1 class="owner-title" th:text="${title}">No puedes entrar en esta zona</h1>
                <p class="owner-copy max-w-2xl" th:text="${detail}">La ruta solicitada no está disponible para tu sesión actual.</p>
            </div>

            <div class="mt-6 flex flex-col gap-3 sm:flex-row">
                <a class="owner-button-primary justify-center" th:href="${actionUrl}" th:text="${actionLabel}">Volver</a>

                <form method="post" th:action="@{/logout}" th:if="${showLogout}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="owner-button-secondary w-full justify-center sm:w-auto" type="submit">Cerrar sesión</button>
                </form>
            </div>
        </section>
    </section>
</main>
</body>
</html>
