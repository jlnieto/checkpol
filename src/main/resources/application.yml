spring:
  application:
    name: checkpol
  flyway:
    enabled: true
  jpa:
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

checkpol:
  security:
    bootstrap-admin:
      username: ${CHECKPOL_SECURITY_ADMIN_USERNAME:admin}
      password: ${CHECKPOL_SECURITY_ADMIN_PASSWORD:cambiar-clave-admin}
      display-name: ${CHECKPOL_SECURITY_ADMIN_DISPLAY_NAME:Administrador}
  municipality:
    catalog:
      import-on-startup: ${CHECKPOL_MUNICIPALITY_CATALOG_IMPORT_ON_STARTUP:false}
      source: ${CHECKPOL_MUNICIPALITY_CATALOG_SOURCE:classpath-csv}
      source-version: ${CHECKPOL_MUNICIPALITY_CATALOG_SOURCE_VERSION:example-v1}
      municipalities-resource: ${CHECKPOL_MUNICIPALITY_CATALOG_MUNICIPALITIES_RESOURCE:classpath:municipality-catalog/spanish-municipalities.csv}
      postal-mappings-resource: ${CHECKPOL_MUNICIPALITY_CATALOG_POSTAL_MAPPINGS_RESOURCE:classpath:municipality-catalog/spanish-postal-code-municipalities.csv}
    admin:
      default-source: ${CHECKPOL_MUNICIPALITY_ADMIN_DEFAULT_SOURCE:ine-open-data}
      default-municipalities-url: ${CHECKPOL_MUNICIPALITY_ADMIN_DEFAULT_MUNICIPALITIES_URL:https://www.ine.es/daco/daco42/codmun/diccionario26.xlsx}
      default-postal-mappings-url: ${CHECKPOL_MUNICIPALITY_ADMIN_DEFAULT_POSTAL_MAPPINGS_URL:https://www.ine.es/prodyser/callejero/caj_esp/caj_esp_072025.zip}
      verification:
        enabled: ${CHECKPOL_MUNICIPALITY_ADMIN_VERIFICATION_ENABLED:false}
        cron: ${CHECKPOL_MUNICIPALITY_ADMIN_VERIFICATION_CRON:0 0 6 * * *}
        zone: ${CHECKPOL_MUNICIPALITY_ADMIN_VERIFICATION_ZONE:Europe/Madrid}
        triggered-by: ${CHECKPOL_MUNICIPALITY_ADMIN_VERIFICATION_TRIGGERED_BY:system-verifier}
  ses:
    credentials:
      secret: ${CHECKPOL_SES_CREDENTIALS_SECRET:checkpol-dev-ses-secret-change-me}
    ws:
      url: ${CHECKPOL_SES_WS_URL:https://hospedajes.ses.mir.es/hospedajes-web/ws/v1/comunicacion}
      application-name: ${CHECKPOL_SES_WS_APPLICATION_NAME:checkpol}
      truststore-path: ${CHECKPOL_SES_WS_TRUSTSTORE_PATH:}
      truststore-password: ${CHECKPOL_SES_WS_TRUSTSTORE_PASSWORD:}
      truststore-type: ${CHECKPOL_SES_WS_TRUSTSTORE_TYPE:PKCS12}
